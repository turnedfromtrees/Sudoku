    <style>

        .puzzle-page-header {

        .sudoku-grid {

            border: 1px solid #999;

        /* Box borders for different grid sizes */
        .grid-4x4 td:nth-child(2n) {

        .grid-4x4 tr:nth-child(2n) td {

        .grid-6x6 td:nth-child(3n) {

        .grid-9x9 td:nth-child(3n) {

        .sudoku-grid td.given {

        .sudoku-grid td.empty {

        .puzzle-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;

        .empty-state {
            text-align: center;
            padding: 80px 20px;

        .ad-container {

        /* Print Styles */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                max-width: 100%;

            header, .controls, .ad-container, .empty-state, .btn-print {
                display: none !important;
            }

            .puzzles-container {
                box-shadow: none;
                border-radius: 0;
                padding: 0;
            }

            .puzzles-grid {
                gap: 20px;
            }

            .puzzle-page {
                border: 2px solid #333;
                padding: 15px;
                page-break-inside: avoid;
            }

            .puzzle-page-header h3 {
                font-size: 1rem;
            }

            .sudoku-grid td {
                width: 35px;
                height: 35px;
                font-size: 1rem;

            .puzzle-footer {
                font-size: 0.75rem;
            }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .controls {
                padding: 20px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            .sudoku-grid td {

                height: 32px;
                font-size: 1rem;
            }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧩 Sudoku Print Generator</h1>
            <p>Free printable Sudoku puzzles in multiple sizes and difficulty levels</p>
        </header>

        <div class="controls">
            <div class="controls-grid">
                <div class="control-group">
                    <label for="difficulty">Difficulty</label>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="gridSize">Puzzle Size</label>
                    <select id="gridSize">
                        <option value="4">4×4 (Kids)</option>
                        <option value="6">6×6 (Junior)</option>
                        <option value="9" selected>9×9 (Standard)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="puzzlesPerPage">Puzzles per Page</label>
                    <select id="puzzlesPerPage">
                        <option value="1">1 puzzle</option>
                        <option value="2" selected>2 puzzles</option>
                        <option value="4">4 puzzles</option>
                        <option value="6">6 puzzles</option>
                        <option value="9">9 puzzles</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="paperSize">Paper Size</label>
                    <select id="paperSize">
                        <option value="a4" selected>A4</option>
                        <option value="letter">US Letter</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="includeSolutions">Solutions</label>
                    <select id="includeSolutions">
                        <option value="none" selected>No solutions</option>
                        <option value="last">Last page only</option>
                        <option value="each">After each puzzle</option>
                    </select>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-generate" onclick="generatePuzzles()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 11-6.219-8.56"/>
                        <polyline points="21 3 21 9 15 9"/>
                    </svg>
                    Generate
                </button>
                <button class="btn btn-print" onclick="printPuzzles()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"/>
                        <path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
                        <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    Print
                </button>
            </div>
        </div>

        <div class="ad-container">
            <!-- AdSense will go here -->
            <p>Advertisement Space</p>
        </div>

        <div class="puzzles-container" id="puzzlesContainer">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                    <line x1="15" y1="3" x2="15" y2="21"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="3" y1="15" x2="21" y2="15"/>
                </svg>
                <p>Click "Generate" to create your printable Sudoku puzzles</p>
            </div>
        </div>
    </div>

    <script>
        // Sudoku Generator
        class SudokuGenerator {
            constructor(size) {
                this.size = size;
                this.sqrtN = Math.sqrt(size);
                // For 6x6, we need to handle 2x3 blocks
                this.blockRows = size === 6 ? 2 : this.sqrtN;
                this.blockCols = size === 6 ? 3 : this.sqrtN;
            }

            // Check if a number can be placed at (row, col)
            isValid(board, row, col, num) {
                // Check row
                for (let x = 0; x < this.size; x++) {
                    if (board[row][x] === num) return false;
                }

                // Check column
                for (let x = 0; x < this.size; x++) {
                    if (board[x][col] === num) return false;
                }

                // Check block
                const startRow = row - row % this.blockRows;
                const startCol = col - col % this.blockCols;
                for (let i = 0; i < this.blockRows; i++) {
                    for (let j = 0; j < this.blockCols; j++) {
                        if (board[startRow + i][startCol + j] === num) return false;
                    }
                }

                return true;
            }

            // Fill the board using backtracking
            fillBoard(board) {
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (board[row][col] === 0) {
                            const numbers = this.shuffleArray([...Array(this.size)].map((_, i) => i + 1));
                            for (const num of numbers) {
                                if (this.isValid(board, row, col, num)) {
                                    board[row][col] = num;
                                    if (this.fillBoard(board)) return true;
                                    board[row][col] = 0;
                                }
                            }
                            return false;
                        }
                    }
                }
                return true;
            }

            // Shuffle array (Fisher-Yates)
            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // Remove numbers based on difficulty
            removeNumbers(board, difficulty) {
                const cellsToRemove = {
                    4: { easy: 4, medium: 6, hard: 8, expert: 10 },
                    6: { easy: 10, medium: 14, hard: 18, expert: 22 },
                    9: { easy: 30, medium: 40, hard: 50, expert: 58 }
                };

                const toRemove = cellsToRemove[this.size][difficulty] || 40;
                const puzzle = board.map(row => [...row]);
                let removed = 0;

                while (removed < toRemove) {
                    const row = Math.floor(Math.random() * this.size);
                    const col = Math.floor(Math.random() * this.size);
                    if (puzzle[row][col] !== 0) {
                        puzzle[row][col] = 0;
                        removed++;
                    }
                }

                return puzzle;
            }

            // Generate a complete puzzle
            generate(difficulty) {
                const board = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.fillBoard(board);
                const solution = board.map(row => [...row]);
                const puzzle = this.removeNumbers(board, difficulty);
                return { puzzle, solution };
            }
        }

        // Render puzzle to HTML
        function renderPuzzle(puzzle, puzzleNum, isSolution = false) {
            const size = puzzle.length;
            let gridClass = `grid-${size}x${size}`;
            
            let html = `<div class="puzzle-page">
                <div class="puzzle-page-header">
                    <h3>${isSolution ? 'Solution' : 'Puzzle'} ${puzzleNum}</h3>
                </div>
                <div class="puzzle-wrapper">
                    <table class="sudoku-grid ${gridClass}">`;

            for (let i = 0; i < size; i++) {
                html += '<tr>';
                for (let j = 0; j < size; j++) {
                    const value = puzzle[i][j];
                    const cellClass = value === 0 ? 'empty' : 'given';
                    const displayValue = value === 0 ? '' : value;
                    html += `<td class="${cellClass}">${displayValue}</td>`;
                }
                html += '</tr>';
            }

            html += `</table>
                </div>
                <div class="puzzle-footer">
                    sudokuprint.uk — Free Printable Sudoku Puzzles
                </div>
            </div>`;

            return html;
        }

        // Generate puzzles
        let currentPuzzles = [];
        let currentSolutions = [];

        function generatePuzzles() {
            const difficulty = document.getElementById('difficulty').value;
            const size = parseInt(document.getElementById('gridSize').value);
            const count = parseInt(document.getElementById('puzzlesPerPage').value);
            const solutionsOption = document.getElementById('includeSolutions').value;
            const paperSize = document.getElementById('paperSize').value;

            // Adjust paper size for print
            const style = document.createElement('style');
            style.id = 'paper-size-style';
            style.textContent = paperSize === 'letter' 
                ? '@page { size: letter; margin: 15mm; }'
                : '@page { size: A4; margin: 15mm; }';
            
            const existingStyle = document.getElementById('paper-size-style');
            if (existingStyle) existingStyle.remove();
            document.head.appendChild(style);

            const generator = new SudokuGenerator(size);
            currentPuzzles = [];
            currentSolutions = [];

            let html = '';

            for (let i = 0; i < count; i++) {
                const { puzzle, solution } = generator.generate(difficulty);
                currentPuzzles.push(puzzle);
                currentSolutions.push(solution);

                html += renderPuzzle(puzzle, i + 1);

                if (solutionsOption === 'each') {
                    html += renderPuzzle(solution, i + 1, true);
                }
            }

            // Add solutions at the end if requested
            if (solutionsOption === 'last') {
                html += '<div style="page-break-before: always;"></div>';
                for (let i = 0; i < currentSolutions.length; i++) {
                    html += renderPuzzle(currentSolutions[i], i + 1, true);
                }
            }

            document.getElementById('puzzlesContainer').innerHTML = html;
        }

        function printPuzzles() {
            if (currentPuzzles.length === 0) {
                alert('Please generate puzzles first!');
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
